name: Weekly Dashboard Update

on:
  schedule:
    # Every Sunday at 12:00 UTC
    - cron: '0 12 * * 0'
  workflow_dispatch:  # Manual trigger via GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch latest climate data
        run: python scripts/update_data.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet index.html; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Climate Bot"
          git config user.email "climate-bot@vercel.app"
          git add index.html
          git commit -m "chore: update dashboard data from latest climate sources

- Fetched latest data from WMO, NOAA, IPCC, NASA
- Updated regional impact metrics
- Refreshed extreme weather event data
- Auto-generated by GitHub Actions"
          git push

      - name: No changes
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "No data updates available"
